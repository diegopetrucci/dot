# Set control + space as bind
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Rapid window switching
bind -n C-h previous-window
bind -n C-l next-window

# Floating window
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Start new panes at the current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Enable true color (24-bit color) support for xterm-based terminals
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"

# Set mouse support
set -g mouse on

# Allow typing "#" on keyboards where it is Option+3 (stop tmux from hijacking M-3)
unbind -n M-3
bind -n M-3 send-keys -l "#"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Clean up numbering for deleted windows
set-option -g renumber-windows on

# Use vi motions
# setw -g mode-keys vi

# Disable extended keys (Ghostty applies modifyOtherKeys to pasted newlines, which breaks paste in tmux)
set -g extended-keys off
set -as terminal-features 'xterm*:extkeys'

# Prevent tmux from automatically renaming windows
set-option -g allow-rename off
set-window-option -g automatic-rename off

# Focus events enabled for terminals that support them
set -g focus-events on

# Surface the active tmux window in the terminal title for Moshi.
set -g set-titles on
set -g set-titles-string "#I: #W"

# Move the status bar to the bottom
set -g status-position bottom

set-option -g history-limit 100000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin configuration

# Save and restore tmux environment
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-boot-options 'fullscreen'

# Add spacing between window elements
set -g window-status-separator " "

# Make the selected window obvious in the bottom status line.
set -g window-status-style 'fg=#6c7086,bg=default'
set -g window-status-format ' #I:#W#{?window_flags,#{window_flags}, } '
set -g window-status-current-style 'fg=#cdd6f4,bg=#313244,bold'
set -g window-status-current-format ' #[fg=#cba6f7,bg=#313244,bold]▶ #[fg=#cdd6f4,bg=#313244,bold]#I:#W#{?window_flags,#{window_flags}, }#[default] '

set -g status-left ""
set -g status-right ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
